name: Independence Shadow Live

on:
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Skip prior shadow-live SQLite restore and start with empty state"
        required: false
        default: false
        type: boolean
  schedule:
    # 01:30 UTC daily; chosen to run after typical UTC daily-close settlement.
    - cron: "30 1 * * *"

permissions:
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  shadow-live:
    runs-on: ubuntu-latest
    env:
      MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
      MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
      CMC_API_KEY: ${{ secrets.CMC_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set shadow-live workdir and config path
        run: |
          echo "SHADOW_LIVE_WORKDIR=${{ runner.temp }}/ir-shadow-live-workdir" >> "$GITHUB_ENV"
          echo "SCANNER_CONFIG_PATH=${{ github.workspace }}/config/config.yml" >> "$GITHUB_ENV"
          mkdir -p "${{ runner.temp }}/ir-shadow-live-workdir/artifacts"

      - name: Restore shadow-live SQLite state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.reset_state }}
        id: restore_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATE_RESTORE_STATUS=$(python scripts/shadow_live_state.py restore \
            --workdir "$SHADOW_LIVE_WORKDIR" \
            --repo "${{ github.repository }}" \
            --workflow independence-shadow-live.yml \
            --branch main \
            --current-run-id "${{ github.run_id }}" \
            --restore-dir "${{ runner.temp }}/shadow-live-state-restore")
          echo "state_restore_status=$STATE_RESTORE_STATUS" >> "$GITHUB_OUTPUT"
          echo "STATE_RESTORE_STATUS=$STATE_RESTORE_STATUS" >> "$GITHUB_ENV"

      - name: Initialize reset shadow-live SQLite state
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_state }}
        run: |
          rm -f "$SHADOW_LIVE_WORKDIR/data/independence_release.sqlite"
          echo "STATE_RESTORE_STATUS=cold_start_reset" >> "$GITHUB_ENV"
          echo "PASS: reset_state requested; prior shadow-live SQLite restore skipped"

      - name: Credential preflight
        run: |
          [ -n "${CMC_API_KEY:-}" ] || { echo "FAIL: CMC_API_KEY is required for run_mode=standard"; exit 1; }
          echo "PASS: required credentials present"

      - name: Public MEXC connectivity preflight
        run: |
          curl -sf --max-time 10 "https://api.mexc.com/api/v3/exchangeInfo" > /dev/null \
            || { echo "FAIL: MEXC public endpoint unreachable. Check network/proxy policy."; exit 1; }
          echo "PASS: MEXC public endpoint reachable."

      - name: Bar clock sanity
        id: bar_clock
        run: |
          python - > /tmp/bar_ids.out <<'PY'
          from datetime import datetime, timezone
          from scanner.data.bar_clock import daily_bar_id, get_last_closed_intraday_bar_id
          import re

          now = datetime.now(timezone.utc)
          daily = daily_bar_id(now)
          intraday = get_last_closed_intraday_bar_id(now, timeframe="4h")

          if not re.fullmatch(r"\d{4}-\d{2}-\d{2}", daily):
              raise SystemExit(f"FAIL: Invalid daily_bar_id: {daily}")
          if not re.fullmatch(r"\d{4}-\d{2}-\d{2}T(00|04|08|12|16|20):00:00Z", intraday):
              raise SystemExit(f"FAIL: Invalid intraday_bar_id: {intraday}")

          print(f"daily_bar_id={daily}")
          print(f"intraday_bar_id={intraday}")
          PY
          cat /tmp/bar_ids.out >> "$GITHUB_OUTPUT"

      - name: Run shadow-live orchestrator
        run: |
          python scripts/run_independence_shadow_live.py \
            --workdir "$SHADOW_LIVE_WORKDIR" \
            --daily-bar-id "${{ steps.bar_clock.outputs.daily_bar_id }}" \
            --intraday-bar-id "${{ steps.bar_clock.outputs.intraday_bar_id }}"

      - name: Artifact location assertions
        run: |
          [ -f "$SHADOW_LIVE_WORKDIR/shadow-live-report.json" ] || { echo "FAIL: shadow-live-report.json missing"; exit 1; }
          [ -d "$SHADOW_LIVE_WORKDIR/snapshots/runs" ] || { echo "FAIL: snapshots/runs missing"; exit 1; }
          [ -d "$SHADOW_LIVE_WORKDIR/reports/runs" ] || { echo "FAIL: reports/runs missing"; exit 1; }
          [ -d "$SHADOW_LIVE_WORKDIR/evaluation/exports" ] || { echo "FAIL: evaluation/exports missing"; exit 1; }
          [ -d "$SHADOW_LIVE_WORKDIR/evaluation/replay" ] || { echo "FAIL: evaluation/replay missing"; exit 1; }
          echo "PASS: required artifact roots present"

      - name: Upload report persistence artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-live-reports
          path: |
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/index/
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/daily/
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/runs/
            ${{ runner.temp }}/ir-shadow-live-workdir/snapshots/runs/**/run.manifest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Checkpoint and stage shadow-live SQLite state
        if: success()
        run: |
          python scripts/shadow_live_state.py checkpoint-stage \
            --workdir "$SHADOW_LIVE_WORKDIR" \
            --upload-dir "${{ runner.temp }}/shadow-live-state-upload"

      - name: Upload shadow-live-state
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-live-state
          path: ${{ runner.temp }}/shadow-live-state-upload/independence_release.sqlite
          if-no-files-found: error
          retention-days: 30

      - name: Disk usage visibility
        if: always()
        run: |
          df -h
          du -sh "$SHADOW_LIVE_WORKDIR" || true

      - name: Upload shadow-live artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: independence-shadow-live-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/ir-shadow-live-workdir/shadow-live-report.json
            ${{ runner.temp }}/ir-shadow-live-workdir/snapshots/runs/**
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/runs/**
            ${{ runner.temp }}/ir-shadow-live-workdir/evaluation/exports/**
            ${{ runner.temp }}/ir-shadow-live-workdir/evaluation/replay/**
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/daily/**
            ${{ runner.temp }}/ir-shadow-live-workdir/reports/index/**
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup shadow-live workdir
        if: always()
        run: rm -rf "${{ runner.temp }}/ir-shadow-live-workdir"

  persist-reports:
    needs: shadow-live
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download report persistence artifact
        uses: actions/download-artifact@v4
        with:
          name: shadow-live-reports
          path: ${{ runner.temp }}/shadow-live-report-persistence

      - name: Persist allowed shadow-live reports
        id: persist_reports
        run: |
          python scripts/persist_shadow_live_reports.py \
            --repo-root . \
            --source-root "${{ runner.temp }}/shadow-live-report-persistence"

      - name: Push report persistence commit
        if: steps.persist_reports.outputs.created_commit == 'true'
        run: git push origin HEAD:${{ github.ref_name }}

