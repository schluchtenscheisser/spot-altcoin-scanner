name: AI Sparring Dry Run

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt for the sparring session
        required: true
        type: string
      mode:
        description: Session mode
        required: false
        default: ticket_review
        type: choice
        options:
          - ticket_review
          - implementation_planning
          - roadmap_review
      rounds:
        description: Number of rounds (1..3)
        required: false
        default: "1"
        type: string

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run AI sparring dry-run
        run: |
          python -m tools.ai_sparring.cli \
            --prompt "${{ github.event.inputs.prompt }}" \
            --provider fake \
            --mode "${{ github.event.inputs.mode }}" \
            --rounds "${{ github.event.inputs.rounds }}" \
            --output-dir artifacts/ai-sparring

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-sparring-artifacts
          path: artifacts/ai-sparring/
          if-no-files-found: error
