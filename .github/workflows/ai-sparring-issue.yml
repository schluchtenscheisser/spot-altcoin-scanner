name: AI Sparring Issue UI

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: ai-sparring-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  issue-ui:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -r tools/ai_sparring/requirements.txt

      - name: Handle issue command
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python -m tools.ai_sparring.cli issue-event \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --output-dir artifacts/ai-sparring

      - name: Upload artifacts (if created)
        uses: actions/upload-artifact@v4
        with:
          name: ai-sparring-issue-${{ github.event.issue.number }}-${{ github.run_id }}
          path: artifacts/ai-sparring/
          if-no-files-found: ignore
